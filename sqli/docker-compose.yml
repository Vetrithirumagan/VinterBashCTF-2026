services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sqli-ctf-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./backend/database.db:/app/database.db
    networks:
      - sqli-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sqli-ctf-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sqli-network

networks:
  sqli-network:
    driver: bridge
